# ---------------------------------------------------------------------------
# consumer.cfg - example ld65 config for linking against polyval_long.lib /
#                polyval_short.lib
#
# This is a minimal config that shows the segment layout consumers must
# provide in order to link against the c64-polyval library archives. It is
# modelled after ca65/lib_only.cfg but pared down to the bare minimum a
# real downstream C64 project would need.
#
# Key requirements a consumer config MUST satisfy:
#   1. Define a ZEROPAGE segment starting below $0100.
#   2. Define the three page-aligned BSS segments used by the LONG profile
#      (POLYVAL_HTABLE, POLYVAL_HTABLE8, POLYVAL_REDUCE8). Mark the last two
#      `optional = yes` if you plan to also link the SHORT profile.
#   3. Place CODE + RODATA + DATA + BSS somewhere in RAM away from BASIC /
#      KERNAL / screen. $4000 is a conventional safe spot.
#
# The LONG profile uses ~8.5 KB of BSS for H-tables. The SHORT profile uses
# only ~256 B and leaves POLYVAL_HTABLE8 / POLYVAL_REDUCE8 empty.
# ---------------------------------------------------------------------------

MEMORY {
    ZP:       start = $0002, size = $00FE, type = rw, define = yes;

    # 2-byte PRG load address header so the emitted file parses as a .prg.
    LOADADDR: start = $3FFE, size = $0002, file = %O;

    # Library code + data at high memory, well above BASIC.
    MAIN:     start = $4000, size = $6000, file = %O;
}

SEGMENTS {
    ZEROPAGE:       load = ZP,        type = zp,  optional = yes;
    LOADADDR:       load = LOADADDR,  type = ro;
    STARTUP:        load = MAIN,      type = ro,  optional = yes;
    CODE:           load = MAIN,      type = ro;
    RODATA:         load = MAIN,      type = ro,  optional = yes;
    DATA:           load = MAIN,      type = rw,  optional = yes;
    BSS:            load = MAIN,      type = bss, define = yes, optional = yes;

    # Page-aligned BSS segments. The two *8 ones are LONG-profile only, so
    # keep them optional to stay compatible with polyval_short.lib.
    POLYVAL_HTABLE:  load = MAIN, type = bss, align = $100, optional = yes, define = yes;
    POLYVAL_HTABLE8: load = MAIN, type = bss, align = $100, optional = yes, define = yes;
    POLYVAL_REDUCE8: load = MAIN, type = bss, align = $100, optional = yes, define = yes;
}
