# ---------------------------------------------------------------------------
# lib_only.cfg - ld65 config for the library-only verification build.
#
# This config is used by `make lib` and `make consumer-check`. It links
# ONLY the lib .o files (tables/data/aes/gcm_siv/polyval_long-or-short) +
# a minimal stub. If any lib file references an app-layer symbol that is
# not defined in this link set, ld65 will error with "unresolved external"
# -- that error IS the verification that the library is self-contained.
#
# Segment naming mirrors src/c64.cfg per c64-lib-contract SPEC §4. CODE /
# RODATA / DATA / BSS are kept as `optional = yes` defensive aliases — the
# library .s files should no longer emit into them after the SPEC §4
# rename, but ld65 tolerates the empty entries cleanly.
#
# Differences from c64.cfg:
#   - LIB_ORIGIN = $4000  (not $0801 -- this build does NOT use a BASIC
#     stub; it is not intended to run).
#   - No LOADADDR segment needed (no PRG header constraint), but we still
#     emit one so the produced file has a `.prg`-parseable header.
#   - Same ZEROPAGE / LIB_POLYVAL_* segment shape as c64.cfg so the lib
#     .o files link cleanly under either config.
# ---------------------------------------------------------------------------

MEMORY {
    ZP:       start = $0002, size = $00FE, type = rw, define = yes;

    # 2-byte PRG load address header so the emitted file is syntactically
    # a valid .prg (even though it's not meant to run).
    LOADADDR: start = $3FFE, size = $0002, file = %O;

    # Library code + data at high memory, well away from BASIC / KERNAL.
    MAIN:     start = $4000, size = $6000, file = %O;
}

SEGMENTS {
    ZEROPAGE:                      load = ZP,       type = zp,  optional = yes;
    LOADADDR:                      load = LOADADDR, type = ro;

    # Defensive aliases — kept optional so an accidental default-segment
    # emission from any .s file still links instead of mysteriously failing.
    STARTUP:                       load = MAIN, type = ro,  optional = yes;
    CODE:                          load = MAIN, type = ro,  optional = yes;
    RODATA:                        load = MAIN, type = ro,  optional = yes;
    DATA:                          load = MAIN, type = rw,  optional = yes;
    BSS:                           load = MAIN, type = bss, optional = yes, define = yes;

    # --- Library code (SPEC §4 prefixed segments) ----------------------
    LIB_POLYVAL_AES_CODE:          load = MAIN, type = ro, optional = yes;
    LIB_POLYVAL_GCMSIV_CODE:       load = MAIN, type = ro, optional = yes;
    LIB_POLYVAL_LONG_CODE:         load = MAIN, type = ro, optional = yes;
    LIB_POLYVAL_SHORT_CODE:        load = MAIN, type = ro, optional = yes;
    LIB_POLYVAL_VERIFY_CODE:       load = MAIN, type = ro, optional = yes;

    # --- Library RODATA -----------------------------------------------
    LIB_POLYVAL_AES_RODATA:        load = MAIN, type = ro, optional = yes;

    # --- Library BSS --------------------------------------------------
    LIB_POLYVAL_BSS:               load = MAIN, type = bss, optional = yes, define = yes;
    LIB_POLYVAL_AES_BSS:           load = MAIN, type = bss, optional = yes, define = yes;
    LIB_POLYVAL_GCMSIV_BSS:        load = MAIN, type = bss, optional = yes, define = yes;

    # Same alignment discipline as c64.cfg so lib .o files using these
    # segments link identically. `optional = yes` means the SHORT profile
    # (which omits polyval_htable8 / polyval_reduce8) still links.
    LIB_POLYVAL_HTABLE:        load = MAIN, type = bss, align = $100, optional = yes, define = yes;
    LIB_POLYVAL_LONG_HTABLE8:  load = MAIN, type = bss, align = $100, optional = yes, define = yes;
    LIB_POLYVAL_LONG_REDUCE8:  load = MAIN, type = bss, align = $100, optional = yes, define = yes;
}
