# ---------------------------------------------------------------------------
# c64.cfg - ld65 linker configuration for c64-polyval (ca65 port)
#
# Minimal, self-contained: does NOT depend on cc65's c64.lib or runtime.
# Produces a .prg with a $0801 BASIC load header suitable for VICE.
#
# Memory map:
#   $0002..$00FF   ZP         zero-page (first two bytes are 6510 I/O regs)
#   $07FF..$0800   LOADADDR   2-byte PRG load header ($0801 little-endian)
#   $0801..$87FF   MAIN       BASIC stub + code + data + tables
#
# Segment naming follows c64-lib-contract SPEC §4: every library code /
# rodata / bss segment is prefixed `LIB_POLYVAL_*` with per-variant splits
# (AES / GCMSIV / LONG / SHORT). Consumer projects that vendor this library
# as a git submodule pick up the bytes by segment name from their own cfg's
# SEGMENTS{} block — zero source patches at integration.
#
# Standalone PRG build (this file) aliases every prefixed library segment
# back to the single MAIN memory region so the library's own test PRG layout
# is preserved. The placement order below matches the pre-rename baseline so
# the resulting polyval.prg stays byte-identical. ZEROPAGE / LOADADDR /
# STARTUP are universal (not library-prefixed); CODE / RODATA / DATA / BSS
# carry the demo app's APP_MODULES bytes only.
# ---------------------------------------------------------------------------

MEMORY {
    # Zero page. Reserve $02..$FF; downstream ports will carve out regions
    # (polyval_acc, pv_mul_input, etc.) using .segment "ZEROPAGE" + org.
    ZP:       start = $0002, size = $00FE, type = rw, define = yes;

    # 2-byte PRG load address header. ld65 writes $01 $08 here, and because
    # `file = %O` this region is emitted as the first two bytes of the .prg.
    # `start = %S - 2` ties it to the main start address ($0801).
    LOADADDR: start = $07FF, size = $0002, file = %O;

    # Main program memory. BASIC stub lives at $0801, code/data follows.
    MAIN:     start = $0801, size = $7FFF, file = %O;
}

SEGMENTS {
    # --- Zero page ------------------------------------------------------
    ZEROPAGE:       load = ZP,        type = zp,  optional = yes;

    # --- PRG load-address header ---------------------------------------
    # Contains a single `.word $0801` so VICE knows where to load.
    LOADADDR:       load = LOADADDR,  type = ro;

    # --- Program code --------------------------------------------------
    # STARTUP holds the BASIC stub + entry point so it lands first at $0801.
    # CODE carries the demo-app APP_MODULES (boot, main_loop, disk_io,
    # display, gcm_siv_ui). Library code follows in per-variant prefixed
    # segments so consumers can link only the variants they use.
    STARTUP:                       load = MAIN, type = ro;
    CODE:                          load = MAIN, type = ro;
    LIB_POLYVAL_AES_CODE:          load = MAIN, type = ro, optional = yes;
    LIB_POLYVAL_GCMSIV_CODE:       load = MAIN, type = ro, optional = yes;
    LIB_POLYVAL_LONG_CODE:         load = MAIN, type = ro, optional = yes;
    LIB_POLYVAL_SHORT_CODE:        load = MAIN, type = ro, optional = yes;
    LIB_POLYVAL_VERIFY_CODE:       load = MAIN, type = ro, optional = yes;

    # --- Read-only data ------------------------------------------------
    # RODATA holds APP_MODULES strings (strings.s, data_app.s default
    # filename). LIB_POLYVAL_AES_RODATA holds the library's S-box / inverse
    # S-box / round constants.
    RODATA:                        load = MAIN, type = ro;
    LIB_POLYVAL_AES_RODATA:        load = MAIN, type = ro, optional = yes;

    # --- Initialized RW data -------------------------------------------
    DATA:                          load = MAIN, type = rw;

    # --- Uninitialized RW state (BSS) ----------------------------------
    # BSS carries APP_MODULES buffers. Library BSS follows in per-variant
    # prefixed segments so a consumer can carve them into separate memory
    # regions (e.g. SRAM-backed) at integration time.
    BSS:                           load = MAIN, type = bss, define = yes;
    LIB_POLYVAL_BSS:               load = MAIN, type = bss, optional = yes, define = yes;
    LIB_POLYVAL_AES_BSS:           load = MAIN, type = bss, optional = yes, define = yes;
    LIB_POLYVAL_GCMSIV_BSS:        load = MAIN, type = bss, optional = yes, define = yes;

    # --- Page-aligned crypto tables ------------------------------------
    # Filled at runtime by polyval_precompute_table, so `type = bss`:
    # ld65 reserves the space and emits nothing to the PRG, keeping the
    # file small. `align = $100` places each segment on a page boundary,
    # and because every slice inside is exactly 256 bytes, the per-slice
    # labels (polyval_htable8_s0..s15, polyval_reduce8_s0..s15) land on
    # page boundaries too.
    LIB_POLYVAL_HTABLE:        load = MAIN, type = bss, align = $100, optional = yes, define = yes;
    LIB_POLYVAL_LONG_HTABLE8:  load = MAIN, type = bss, align = $100, optional = yes, define = yes;
    LIB_POLYVAL_LONG_REDUCE8:  load = MAIN, type = bss, align = $100, optional = yes, define = yes;
}
